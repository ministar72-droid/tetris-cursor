<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>테트리스</h1>
    </header>

    <main class="game-area">
      <section class="board-section">
        <div id="game-board" aria-label="테트리스 게임 보드"></div>
      </section>

      <aside class="info-panel">
        <div class="score-box">
          <h2>점수</h2>
          <p id="score" class="score-value">0</p>
        </div>

        <div id="game-over" class="game-over" hidden>
          <p class="game-over-title">게임 오버</p>
          <p class="game-over-message">재시작 버튼을 눌러 다시 시작하세요.</p>
        </div>

        <div class="button-group">
          <button id="start-btn" type="button">시작</button>
          <button id="restart-btn" type="button">재시작</button>
        </div>

        <div class="controls-box">
          <h2>조작법</h2>
          <ul>
            <li><kbd>←</kbd> (<kbd>ArrowLeft</kbd>) : 왼쪽 이동</li>
            <li><kbd>→</kbd> (<kbd>ArrowRight</kbd>) : 오른쪽 이동</li>
            <li><kbd>↓</kbd> (<kbd>ArrowDown</kbd>) : 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> (<kbd>ArrowUp</kbd>) : 블록 회전</li>
            <li><kbd>Space</kbd> : 즉시 바닥까지 내리기 (hard drop)</li>
          </ul>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
